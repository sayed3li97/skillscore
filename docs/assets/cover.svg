<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="'SFMono-Regular','SF Mono','JetBrains Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <style>
      .prompt { fill:#3fb950; }
      .word   { fill:#e6edf3; }
      .cursor { fill:#2f3845; }
      .h      { fill:#e6edf3; font-size:41px; font-weight:700; letter-spacing:-0.5px; }
      .acc    { fill:#4d9fff; }
      .sub    { fill:#7d8795; font-size:15px; }
      .cta    { fill:#4d9fff; font-size:16px; }
      .foot   { fill:#59626f; font-size:14px; }
      .card   { fill:#12171f; stroke:#2a323d; stroke-width:1.5; }
      .clabel { fill:#7d8795; font-size:15px; }
      .num    { fill:#4d9fff; font-size:44px; font-weight:700; }
      .den    { fill:#59626f; font-size:20px; }
      .badge  { fill:#0f1a2b; stroke:#4d9fff; stroke-width:1.5; }
      .bl     { fill:#cfe4ff; font-size:20px; font-weight:700; }
      .brow   { fill:#7d8795; font-size:13px; }
      .track  { fill:#1a212b; }
      .fill   { fill:#3a7fd5; transform-box:fill-box; transform-origin:left center;
                animation:grow .9s cubic-bezier(.2,.7,.2,1) both; }
      .blink  { animation:blink 1.1s steps(1) infinite; }
      @keyframes grow{from{transform:scaleX(0.02)}to{transform:scaleX(1)}}
      @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
      .a1{animation-delay:.15s}.a2{animation-delay:.24s}.a3{animation-delay:.33s}
      .a4{animation-delay:.42s}.a5{animation-delay:.51s}.a6{animation-delay:.60s}
    </style>
  </defs>

  <!-- background -->
  <rect width="1000" height="420" fill="#0d1117"/>
  <circle cx="900" cy="40" r="240" fill="url(#glow)"/>
  <line x1="0" y1="0.5" x2="1000" y2="0.5" stroke="#4d9fff" stroke-opacity="0.35" stroke-width="1"/>

  <!-- LEFT: wordmark, headline, tagline -->
  <text x="64" y="118" font-size="28" font-weight="600">
    <tspan class="prompt">$ </tspan><tspan class="word">skillscore</tspan><tspan class="cursor blink"> _</tspan>
  </text>

  <text class="h" x="63" y="188">Score your agent's</text>
  <text class="h" x="63" y="236"><tspan class="acc">SKILL.md</tspan>, <tspan class="acc">0 to 100</tspan>.</text>

  <text class="sub" x="64" y="292">Lint and grade skills against the Claude, Codex, and</text>
  <text class="sub" x="64" y="314">Antigravity guides. Offline, deterministic, CI-ready.</text>

  <text class="cta" x="64" y="376">dart pub global activate skillscore</text>
  <text class="foot" x="936" y="376" text-anchor="end">offline &#183; deterministic &#183; Apache-2.0</text>

  <!-- RIGHT: scorecard in the house style -->
  <g transform="translate(650,92)">
    <rect class="card" x="0" y="0" width="290" height="252" rx="14"/>
    <text class="clabel" x="24" y="42">my-skill</text>
    <text class="num" x="23" y="86">100</text>
    <text class="den" x="103" y="86">/100</text>
    <rect class="badge" x="212" y="52" width="52" height="36" rx="9"/>
    <text class="bl" x="238" y="77" text-anchor="middle">A</text>

    <!-- category bars, all full (a perfect skill) -->
    <g>
      <text class="brow" x="24" y="123">A</text><rect class="track" x="44" y="113" width="222" height="9" rx="4.5"/><rect class="fill a1" x="44" y="113" width="222" height="9" rx="4.5"/>
      <text class="brow" x="24" y="145">B</text><rect class="track" x="44" y="135" width="222" height="9" rx="4.5"/><rect class="fill a2" x="44" y="135" width="222" height="9" rx="4.5"/>
      <text class="brow" x="24" y="167">C</text><rect class="track" x="44" y="157" width="222" height="9" rx="4.5"/><rect class="fill a3" x="44" y="157" width="222" height="9" rx="4.5"/>
      <text class="brow" x="24" y="189">D</text><rect class="track" x="44" y="179" width="222" height="9" rx="4.5"/><rect class="fill a4" x="44" y="179" width="222" height="9" rx="4.5"/>
      <text class="brow" x="24" y="211">E</text><rect class="track" x="44" y="201" width="222" height="9" rx="4.5"/><rect class="fill a5" x="44" y="201" width="222" height="9" rx="4.5"/>
      <text class="brow" x="24" y="233">F</text><rect class="track" x="44" y="223" width="222" height="9" rx="4.5"/><rect class="fill a6" x="44" y="223" width="222" height="9" rx="4.5"/>
    </g>
  </g>
</svg>
