<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="'SFMono-Regular','SF Mono','JetBrains Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4d9fff"/>
      <stop offset="1" stop-color="#2f6fd0"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#5a6472" fill-opacity="0.09"/>
    </pattern>
    <filter id="ringglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <style>
      .prompt{fill:#3fb950} .word{fill:#e6edf3} .cursor{fill:#2f3845}
      .h{fill:#e6edf3;font-size:41px;font-weight:700;letter-spacing:-0.5px}
      .acc{fill:#4d9fff}
      .sub{fill:#7d8795;font-size:15px}
      .cta{fill:#4d9fff;font-size:16px}
      .foot{fill:#59626f;font-size:14px}
      .track{fill:none;stroke:#1a212b;stroke-width:24}
      .seg{fill:none;stroke:url(#ring);stroke-width:24;stroke-linecap:butt;
            animation:draw 1.1s cubic-bezier(.2,.7,.2,1) both}
      .score{fill:#eaf2ff;font-size:58px;font-weight:700;letter-spacing:-1px}
      .grade{fill:#4d9fff;font-size:17px;letter-spacing:3px}
      .rlab{fill:#7d8795;font-size:14px}
      .blink{animation:blink 1.1s steps(1) infinite}
      @keyframes draw{from{stroke-dashoffset:var(--len)}to{stroke-dashoffset:0}}
      @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
      .s0{animation-delay:0.25s}
      .s1{animation-delay:0.36s}
      .s2{animation-delay:0.47s}
      .s3{animation-delay:0.58s}
      .s4{animation-delay:0.69s}
      .s5{animation-delay:0.80s}
    </style>
  </defs>

  <rect width="1200" height="480" fill="#0d1117"/>
  <rect width="1200" height="480" fill="url(#dots)"/>
  <circle cx="948" cy="200" r="300" fill="url(#glow)"/>
  <line x1="0" y1="0.5" x2="1200" y2="0.5" stroke="#4d9fff" stroke-opacity="0.35" stroke-width="1"/>

  <!-- LEFT: wordmark, headline, tagline, install -->
  <text x="72" y="120" font-size="28" font-weight="600"><tspan class="prompt">$ </tspan><tspan class="word">skillscore</tspan><tspan class="cursor blink"> _</tspan></text>

  <text class="h" x="71" y="196">Score your agent's</text>
  <text class="h" x="71" y="244"><tspan class="acc">SKILL.md</tspan>, <tspan class="acc">0 to 100</tspan>.</text>

  <text class="sub" x="72" y="302">Lint and grade skills against the Claude, Codex,</text>
  <text class="sub" x="72" y="324">and Antigravity guides. Offline. Deterministic.</text>

  <text class="cta" x="72" y="392">dart pub global activate skillscore</text>
  <text class="foot" x="72" y="430">26 rules &#183; 7 categories &#183; cited sources &#183; Apache-2.0</text>

  <!-- HERO: radial rubric ring -->
  <circle cx="948" cy="236" r="138" fill="none" stroke="#4d9fff" stroke-width="24" opacity="0.16" filter="url(#ringglow)"/>
  <circle class="track" cx="948" cy="236" r="138"/>
    <path class="seg s0" d="M 954.02 98.13 A 138 138 0 0 1 1062.12 158.40" stroke-dasharray="128.3" stroke-dashoffset="0" style="--len:128.3"/>
    <path class="seg s1" d="M 1068.45 168.65 A 138 138 0 0 1 1013.24 357.60" stroke-dasharray="219.2" stroke-dashoffset="0" style="--len:219.2"/>
    <path class="seg s2" d="M 1002.40 362.83 A 138 138 0 0 1 893.60 362.83" stroke-dasharray="111.8" stroke-dashoffset="0" style="--len:111.8"/>
    <path class="seg s3" d="M 882.76 357.60 A 138 138 0 0 1 814.93 272.55" stroke-dasharray="111.8" stroke-dashoffset="0" style="--len:111.8"/>
    <path class="seg s4" d="M 812.25 260.81 A 138 138 0 0 1 865.36 125.48" stroke-dasharray="153.1" stroke-dashoffset="0" style="--len:153.1"/>
    <path class="seg s5" d="M 875.31 118.70 A 138 138 0 0 1 941.98 98.13" stroke-dasharray="70.5" stroke-dashoffset="0" style="--len:70.5"/>
    <text class="rlab" x="1029.8" y="94.3" text-anchor="middle">A</text>
    <text class="rlab" x="1109.3" y="288.1" text-anchor="middle">B</text>
    <text class="rlab" x="948.0" y="409.0" text-anchor="middle">C</text>
    <text class="rlab" x="816.7" y="345.7" text-anchor="middle">D</text>
    <text class="rlab" x="791.6" y="179.6" text-anchor="middle">E</text>
    <text class="rlab" x="898.5" y="80.5" text-anchor="middle">F</text>
  <text class="score" x="948" y="242" text-anchor="middle">100</text>
  <text class="grade" x="948" y="274" text-anchor="middle">GRADE A</text>
</svg>
