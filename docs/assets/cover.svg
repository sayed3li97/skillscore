<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#121a2b"/>
      <stop offset="1" stop-color="#0a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1000" height="420" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#1e2a3a" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1000" y2="105"/>
    <line x1="0" y1="210" x2="1000" y2="210"/>
    <line x1="0" y1="315" x2="1000" y2="315"/>
  </g>
  <!-- glow accent -->
  <circle cx="880" cy="70" r="120" fill="#1f6feb" opacity="0.18" filter="url(#soft)"/>

  <!-- LEFT: wordmark + tagline -->
  <g font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,monospace">
    <text x="64" y="150" font-size="30" fill="#7ee787" font-weight="600">$ </text>
    <text x="98" y="150" font-size="30" fill="#c9d1d9" font-weight="600">skillscore</text>
    <text x="318" y="150" font-size="30" fill="#484f58">_</text>
  </g>
  <g font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
    <text x="64" y="208" font-size="46" font-weight="800" fill="#ffffff">Score your AI agent's</text>
    <text x="64" y="262" font-size="46" font-weight="800" fill="url(#accent)">SKILL.md, 0–100.</text>
    <text x="64" y="312" font-size="21" fill="#8b949e" font-weight="400">Lint &amp; grade skills against the Claude, Codex &amp;</text>
    <text x="64" y="340" font-size="21" fill="#8b949e" font-weight="400">Antigravity guides — offline, deterministic, CI-ready.</text>
  </g>

  <!-- RIGHT: scorecard mock -->
  <g transform="translate(648,96)">
    <rect x="0" y="0" width="296" height="228" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <!-- card header -->
    <text x="22" y="42" font-family="'SF Mono',Menlo,monospace" font-size="15" fill="#8b949e">flutter-add-widget-test</text>
    <text x="22" y="78" font-family="-apple-system,'Segoe UI',sans-serif" font-size="40" font-weight="800" fill="#3fb950">90</text>
    <text x="92" y="78" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="600" fill="#8b949e">/100</text>
    <rect x="170" y="48" width="50" height="34" rx="8" fill="#1a2e1f" stroke="#3fb950" stroke-width="1.5"/>
    <text x="182" y="72" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#7ee787">A</text>

    <!-- category bars -->
    <g font-family="'SF Mono',Menlo,monospace" font-size="13" fill="#8b949e">
      <text x="22" y="118">A</text><rect x="40" y="107" width="234" height="9" rx="4.5" fill="#21262d"/><rect x="40" y="107" width="234" height="9" rx="4.5" fill="url(#barGreen)"/>
      <text x="22" y="140">B</text><rect x="40" y="129" width="234" height="9" rx="4.5" fill="#21262d"/><rect x="40" y="129" width="196" height="9" rx="4.5" fill="#d29922"/>
      <text x="22" y="162">C</text><rect x="40" y="151" width="234" height="9" rx="4.5" fill="#21262d"/><rect x="40" y="151" width="234" height="9" rx="4.5" fill="url(#barGreen)"/>
      <text x="22" y="184">D</text><rect x="40" y="173" width="234" height="9" rx="4.5" fill="#21262d"/><rect x="40" y="173" width="234" height="9" rx="4.5" fill="url(#barGreen)"/>
      <text x="22" y="206">E</text><rect x="40" y="195" width="234" height="9" rx="4.5" fill="#21262d"/><rect x="40" y="195" width="164" height="9" rx="4.5" fill="#d29922"/>
    </g>
  </g>

  <!-- bottom strip -->
  <text x="64" y="392" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#58a6ff">dart pub global activate skillscore</text>
  <text x="936" y="392" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#484f58">Apache-2.0 · pub.dev</text>
</svg>
