<svg viewBox="0 0 1160 500" xmlns="http://www.w3.org/2000/svg" font-family="'SFMono-Regular','SF Mono','JetBrains Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace">
  <defs>
    <style>
      .card { fill:#0d1117; stroke:#1b2029; }
      .node { fill:#12171f; stroke:#2a323d; stroke-width:1.5; }
      .accent{ fill:#0f1a2b; stroke:#4d9fff; stroke-width:1.5; }
      .zone { fill:#59626f; font-size:13px; letter-spacing:.22em; }
      .subh { fill:#7d8795; font-size:15px; }
      .lbl  { fill:#e6edf3; font-size:20px; }
      .sub  { fill:#8b95a3; font-size:13px; }
      .muted{ fill:#59626f; font-size:13px; }
      .base { stroke:#2f3845; stroke-width:1.6; fill:none; }
      .green{ stroke:#2f6f42; stroke-width:1.6; fill:none; }
      .red  { stroke:#7f2f2c; stroke-width:1.6; fill:none; }
      .blue { stroke:#2f5c9e; stroke-width:1.6; fill:none; }
      .dot  { fill:#9cc9ff; animation:travel 1.6s cubic-bezier(.45,0,.25,1) infinite; }
      .halo { fill:#4d9fff; opacity:.22; animation:travel 1.6s cubic-bezier(.45,0,.25,1) infinite; }
      .cap  { fill:#59626f; font-size:14px; }
      .capA { fill:#4d9fff; font-size:14px; }
      .g    { animation:rise .55s cubic-bezier(.2,.7,.2,1) both; }
      .fl   { animation:fade .5s ease both; }
      .d1{animation-delay:.10s}.d2{animation-delay:.30s}.d3{animation-delay:.50s}
      .d4{animation-delay:.74s}.d5{animation-delay:.86s}.d6{animation-delay:.98s}
      .fd1{animation-delay:.26s}.fd2{animation-delay:.46s}.fd3{animation-delay:.66s}
      @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
      @keyframes fade{from{opacity:0}to{opacity:1}}
      @keyframes travel{0%{transform:translateX(0);opacity:0}18%{opacity:1}82%{opacity:1}100%{transform:translateX(50px);opacity:0}}
    </style>
    <marker id="ok" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#3fb950" stroke-width="1.4"/></marker>
    <marker id="no" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#f85149" stroke-width="1.4"/></marker>
    <marker id="bl" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#4d9fff" stroke-width="1.4"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#4a5462" stroke-width="1.3"/></marker>
  </defs>

  <rect class="card" x="8" y="8" width="1144" height="484" rx="18"/>
  <text class="zone" x="44" y="52">CI / CD</text>
  <text class="subh" x="44" y="76">one flag turns any pipeline into a skill-quality gate</text>

  <!-- spine connectors (solid = deterministic), traveling dots -->
  <g class="fl fd1">
    <path class="base" d="M204 250 H248" marker-end="url(#ar)"/>
    <circle class="halo" cx="210" cy="250" r="6"/><circle class="dot" cx="210" cy="250" r="3.4"/>
  </g>
  <g class="fl fd2">
    <path class="base" d="M432 250 H476" marker-end="url(#ar)"/>
    <circle class="halo" cx="438" cy="250" r="6"/><circle class="dot" cx="438" cy="250" r="3.4"/>
  </g>

  <!-- branches from the gate -->
  <path class="green fl fd3" d="M698 250 H734 V156 H766" marker-end="url(#ok)"/>
  <path class="blue  fl fd3" d="M698 250 H766" marker-end="url(#bl)"/>
  <path class="red   fl fd3" d="M698 250 H734 V344 H766" marker-end="url(#no)"/>

  <!-- 1. git push -->
  <g class="g d1">
    <rect class="node" x="48" y="209" width="156" height="82" rx="11"/>
    <text class="lbl" x="126" y="246" text-anchor="middle">git push</text>
    <text class="sub" x="126" y="270" text-anchor="middle">SKILL.md changed</text>
  </g>

  <!-- 2. CI runner -->
  <g class="g d2">
    <rect class="node" x="252" y="209" width="180" height="82" rx="11"/>
    <text class="lbl" x="342" y="246" text-anchor="middle">CI runner</text>
    <text class="sub" x="342" y="270" text-anchor="middle">activates skillscore</text>
  </g>

  <!-- 3. gate (accent) -->
  <g class="g d3">
    <rect class="accent" x="476" y="188" width="222" height="124" rx="12"/>
    <text class="lbl" x="587" y="234" text-anchor="middle" fill="#cfe4ff">skillscore</text>
    <text class="sub" x="587" y="260" text-anchor="middle" fill="#4d9fff">--min-score 80</text>
    <text class="muted" x="587" y="284" text-anchor="middle">the gate</text>
  </g>

  <!-- pass -->
  <g class="g d4">
    <rect class="node" x="766" y="122" width="200" height="70" rx="11" stroke="#2f6f42"/>
    <text class="lbl" x="790" y="152" fill="#8ff0a4" font-size="18">merge</text>
    <text class="sub" x="790" y="174">score &#8805; 80  &#183;  exit 0</text>
  </g>
  <!-- sarif -->
  <g class="g d5">
    <rect class="node" x="766" y="216" width="200" height="70" rx="11" stroke="#2f5c9e"/>
    <text class="lbl" x="790" y="246" fill="#cfe4ff" font-size="18">code scanning</text>
    <text class="sub" x="790" y="268">SARIF annotations</text>
  </g>
  <!-- fail -->
  <g class="g d6">
    <rect class="node" x="766" y="310" width="200" height="70" rx="11" stroke="#7f2f2c"/>
    <text class="lbl" x="790" y="340" fill="#ff9d97" font-size="18">block</text>
    <text class="sub" x="790" y="362">score &lt; 80  &#183;  exit 1</text>
  </g>

  <text class="cap" x="44" y="452">Install, then <tspan class="capA">skillscore skills/ --min-score 80</tspan>. Exit 1 blocks the merge; <tspan class="capA">--format sarif</tspan> annotates the pull request.</text>
</svg>
