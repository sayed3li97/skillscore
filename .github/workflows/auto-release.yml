name: Auto Release

# Runs on every merge to main. Bumps the minor version, updates
# pubspec.yaml / version.dart / CHANGELOG.md, commits the bump,
# creates a git tag, and opens a GitHub Release — all without a PAT.
#
# Loop guard: the version-bump commit message starts with
# "chore: bump version", so the `if` condition below skips it.
#
# Version strategy: minor bump (X.Y.0 → X.Y+1.0).
# Change `MINOR + 1` to `PATCH + 1` below if you prefer patch bumps.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run tests
        run: dart test

      # ── version arithmetic ──────────────────────────────────────────────
      - name: Compute next version
        id: ver
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEXT="${MAJOR}.$((MINOR + 1)).0"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT}"       >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}"       >> "$GITHUB_OUTPUT"

      # ── bump files ─────────────────────────────────────────────────────
      - name: Update pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.ver.outputs.next }}/" pubspec.yaml

      - name: Update version.dart
        run: |
          sed -i "s/packageVersion = '.*'/packageVersion = '${{ steps.ver.outputs.next }}'/" \
            lib/src/version.dart

      # ── changelog ──────────────────────────────────────────────────────
      - name: Build CHANGELOG entry and release notes
        run: |
          # Collect commits since the last version-bump commit (or last tag).
          LAST_BUMP=$(git log --pretty=format:"%H %s" | \
            grep "chore: bump version" | head -1 | awk '{print $1}')

          if [ -n "$LAST_BUMP" ]; then
            RAW=$(git log "${LAST_BUMP}..HEAD" --pretty="format:- %s" --no-merges \
              | grep -v "^- chore:" || true)
          else
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RAW=$(git log "${PREV_TAG}..HEAD" --pretty="format:- %s" --no-merges \
                | grep -v "^- chore:" || true)
            else
              RAW=""
            fi
          fi

          [ -z "$RAW" ] && RAW="- Maintenance and improvements"

          # Write release notes (used by gh release create --notes-file)
          printf '%s\n' "$RAW" > release-notes.md

          # Prepend new section to CHANGELOG.md
          export NEXT_VER="${{ steps.ver.outputs.next }}"
          export DATE
          DATE=$(date -u +%Y-%m-%d)
          export COMMITS="$RAW"

          python3 - << 'PYEOF'
import re, os

version = os.environ['NEXT_VER']
date    = os.environ['DATE']
commits = os.environ['COMMITS']
section = f'## [{version}] - {date}\n\n### Added\n\n{commits}\n\n'

with open('CHANGELOG.md') as f:
    content = f.read()

# Insert before the first existing version section
content = re.sub(r'(?=## \[)', section, content, count=1)

with open('CHANGELOG.md', 'w') as f:
    f.write(content)
PYEOF

      # ── commit, tag, push ───────────────────────────────────────────────
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml lib/src/version.dart CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.ver.outputs.next }}"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin main --follow-tags

      # ── github release ──────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "skillscore ${{ steps.ver.outputs.next }}" \
            --notes-file release-notes.md
