name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk: [stable]
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
      - name: Install dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Test
        run: dart test
      - name: Self-score the bundled fixtures (smoke test)
        run: dart run bin/skillscore.dart test/fixtures/excellent --min-score 90 --no-color
      - name: Score the bundled skill (dogfood — the skill that scores skills must score 100)
        run: dart run bin/skillscore.dart skill/skillscore/ --min-score 100 --no-color

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Verify the package stays publishable
        run: dart pub publish --dry-run
